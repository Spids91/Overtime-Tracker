<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shift Tracker</title>
<style>
  :root{--ink:#14171c;--ink-soft:#4a525e;--line:#d8dde4;--line-soft:#e9edf2;--paper:#f6f7f9;--card:#fff;--hi:#1f6f54;--hi-soft:#e4f1ec;--warn:#b25a1e;--warn-soft:#f6ebe0;--ask:#2d5a8a;--ask-soft:#e4edf6;--bad:#a23b3b;--radius:12px;--mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:16px;line-height:1.45;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 96px}
  header.app{display:flex;align-items:baseline;justify-content:space-between;padding:6px 2px 14px;border-bottom:2px solid var(--ink);margin-bottom:18px}
  header.app h1{font-size:18px;margin:0;letter-spacing:-.01em}
  header.app .tag{font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em}
  h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-family:var(--mono);font-weight:600;margin:24px 2px 10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  label.fld{display:block;margin-bottom:12px}label.fld:last-child{margin-bottom:0}
  label.fld>span{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:5px}
  input,select,button{font-family:var(--sans);font-size:16px}
  input[type=time],input[type=date],input[type=text],select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);appearance:none}
  input:focus,select:focus{outline:2px solid var(--hi);outline-offset:1px;border-color:var(--hi)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:14px;cursor:pointer;font-family:var(--mono)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  button.act{width:100%;padding:13px;border:none;border-radius:10px;background:var(--ink);color:#fff;font-weight:600;cursor:pointer;letter-spacing:.01em}
  button.act.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:500}
  button.act:active{transform:translateY(1px)}
  button.small{width:auto;padding:7px 12px;font-size:13px;border-radius:8px}
  .call{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;background:#fff}
  .call .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .call .cad{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
  .call .del{background:none;border:none;color:var(--bad);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
  .gap-q{border:1px solid var(--ask);background:var(--ask-soft);border-radius:10px;padding:12px;margin-bottom:9px}
  .gap-q .qtxt{font-size:14px;margin-bottom:9px}.gap-q .qtxt b{font-family:var(--mono)}
  .gap-q .opts{display:flex;gap:8px}
  .gap-q .opts button{flex:1;padding:9px;border:1px solid var(--ask);border-radius:8px;background:#fff;color:var(--ask);font-weight:600;cursor:pointer}
  .gap-q .opts button.on{background:var(--ask);color:#fff}
  .result{border:1px solid var(--ink);border-radius:var(--radius);overflow:hidden}
  .result .head{background:var(--ink);color:#fff;padding:12px 14px}
  .result .head .ttl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.8}
  .metrics{display:grid;grid-template-columns:1fr 1fr}
  .metric{padding:16px 14px;border-top:1px solid var(--line)}
  .metric:nth-child(odd){border-right:1px solid var(--line)}
  .metric .big{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
  .metric .lbl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-top:6px}
  .metric.ot .big{color:var(--warn)}.metric.sub .big{color:var(--hi)}
  .ledger{padding:12px 14px;border-top:1px solid var(--line);background:var(--paper)}
  .lrow{display:flex;gap:8px;font-size:13px;padding:5px 0;align-items:baseline}
  .lrow .t{font-family:var(--mono);color:var(--ink-soft);white-space:nowrap}.lrow .d{flex:1}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:999px;margin-left:4px}
  .pill.away{background:var(--hi-soft);color:var(--hi)}.pill.reset{background:var(--warn-soft);color:var(--warn)}
  .pill.t5{background:var(--hi-soft);color:var(--hi)}.pill.t10{background:var(--hi);color:#fff}
  .note{font-size:12px;color:var(--ink-soft);padding:10px 14px;border-top:1px dashed var(--line)}
  .empty{color:var(--ink-soft);font-size:14px;text-align:center;padding:18px}
  details.tt{margin-top:6px}details.tt summary{font-size:13px;color:var(--ask);cursor:pointer;font-family:var(--mono)}
  .tt table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
  .tt th,.tt td{text-align:left;padding:5px 6px;border-bottom:1px solid var(--line-soft)}
  .tt th{font-family:var(--mono);font-size:11px;color:var(--ink-soft);text-transform:uppercase}
  .warnline{color:var(--bad);font-size:13px;padding:8px 0}
  .locnote{font-size:12px;color:var(--ink-soft)}
  .stat{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
  .stat.confirmed{background:var(--hi-soft);color:var(--hi)}
  .stat.estimate{background:var(--warn-soft);color:var(--warn)}
  .tt td input[type=number]{width:64px}
  .hm{display:inline-flex;align-items:center;gap:3px}
  .hm input[type=number]{width:46px;text-align:center}
  .hmlab{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-right:4px}
  .custombox{margin-top:10px;padding:12px;border:1px dashed var(--ask);border-radius:10px;background:var(--ask-soft)}
  .week{border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
  .weekhead{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--ink);color:#fff}
  .weekhead .weektot{font-family:var(--mono);font-size:12px;opacity:.9}
  .dayrow{border-top:1px solid var(--line);padding:10px 13px}
  .dayhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .dayhead .del{background:none;border:none;color:var(--bad);font-size:17px;cursor:pointer;line-height:1;padding:0 2px}
  .daygrid{display:grid;grid-template-columns:1fr 1fr;gap:7px 14px;font-size:13px}
  .daygrid .cadcell{grid-column:1/-1;border-top:1px dashed var(--line-soft);padding-top:7px;font-family:var(--mono);word-break:break-word}
  .dl{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin-bottom:2px}
  .clearcads{margin:10px 13px 13px}
</style>
</head>
<body>
<div class="wrap">
  <header class="app"><h1>Shift Tracker</h1><span class="tag">engine v1 module</span></header>

  <h2 class="sec">Your station</h2>
  <div class="card">
    <label class="fld"><span>Home station (set once, drive-times are measured from here)</span>
      <select id="homeStation"><option value="">Loading stations…</option></select></label>
    <div id="stationNote" class="locnote"></div>
  </div>

  <h2 class="sec">Rostered shift</h2>
  <div class="card">
    <label class="fld"><span>Date</span><input type="date" id="shiftDate"></label>
    <label class="fld"><span>Pattern</span></label>
    <div class="chips" id="patternChips"></div>
    <div class="row2" style="margin-top:12px">
      <label class="fld"><span>Roster start</span><input type="time" id="rosterStart"></label>
      <label class="fld"><span>Roster end</span><input type="time" id="rosterEnd"></label>
    </div>
    <label class="fld"><span>Overtime rounding (always rounded up)</span>
      <select id="otRound"><option value="0">Exact minutes</option><option value="15">15 min</option><option value="30">30 min</option><option value="60">1 hour</option></select>
    </label>
  </div>

  <h2 class="sec">Calls this shift</h2>
  <div id="callList"></div>
  <button class="act ghost" id="addCall">+ Add call</button>
  <details class="tt"><summary>Drive-times from your station (edit to confirm)</summary>
    <div class="locnote" style="margin:6px 2px 10px">Confirmed = you set it. Estimate = derived from map coordinates, unverified. Your edits are saved as confirmed.</div>
    <table><thead><tr><th>Hospital</th><th>Drive time</th><th>Status</th></tr></thead><tbody id="ttBody"></tbody></table>
    <div style="margin-top:8px"><input type="text" id="newLoc" placeholder="Add a location not in the list"></div>
    <button class="act ghost small" id="addLoc" style="margin-top:8px">+ Add location</button>
  </details>

  <h2 class="sec">End of shift</h2>
  <div class="card"><label class="fld"><span>Actual back-at-base time (drives overtime, not the last clear)</span><input type="time" id="backAtBase"></label></div>

  <div id="gapQuestions"></div>
  <button class="act" id="compute" style="margin-top:6px">Compute shift</button>
  <div id="output" style="margin-top:18px"></div>
  <button class="act ghost" id="saveShift" style="margin-top:10px;display:none">Save this shift to my week</button>

  <h2 class="sec">My weeks</h2>
  <div id="history"></div>
</div>

<script>
</script>
<script src="../engine/engine.js"></script>
<script>
/* ===== UI: thin skin over ENGINE. Loads locations.json, keys drive-times to a home station. ===== */
const PATTERNS=["07-19","08-20","19-07","20-08","07-17","08-17"];
let LOC=null;                 // full locations.json
let homeStationId=null;       // chosen station id
let driveTimes={};            // {hospitalName: minutes}  — built per station, fed to ENGINE
let dtMeta={};                // {hospitalName: 'confirmed'|'estimate'} — for labelling only
let calls=[]; let gapAnswers={};
const $=id=>document.getElementById(id);

/* ---- load data ---- */
async function loadLocations(){
  try{
    const res=await fetch('../data/locations.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    LOC=await res.json();
  }catch(e){
    $('homeStation').innerHTML='<option value="">Could not load locations.json</option>';
    $('stationNote').textContent='locations.json did not load. If opening the file directly, serve it instead (a browser blocks local file fetches). On GitHub Pages it works.';
    return;
  }
  // populate station picker: real stations first, flagged ones last
  const stations=[...LOC.stations].sort((a,b)=>{
    const af=a.likely_not_a_station?1:0, bf=b.likely_not_a_station?1:0;
    if(af!==bf) return af-bf;
    return (a.name||'').localeCompare(b.name||'');
  });
  $('homeStation').innerHTML='<option value="">Select your station…</option>'+
    stations.map(s=>`<option value="${s.id}">${s.name}${s.likely_not_a_station?' (not a station?)':''}${s.verified===false?' ·unverified':''}</option>`).join('');
  $('homeStation').onchange=()=>{ homeStationId=$('homeStation').value; buildDriveTimes(); renderTT(); renderCalls(); renderGaps(); saveHome(); };
  // restore previous choice
  const saved=getHome();
  if(saved && stations.some(s=>s.id===saved)){ $('homeStation').value=saved; homeStationId=saved; buildDriveTimes(); }
  renderTT(); renderCalls();
}

/* ---- build the flat driveTimes map ENGINE expects, from chosen station's routes ---- */
function buildDriveTimes(){
  driveTimes={}; dtMeta={};
  if(!LOC||!homeStationId){ $('stationNote').textContent=''; return; }
  const stn=LOC.stations.find(s=>s.id===homeStationId);
  $('stationNote').textContent=stn? `Drive-times below are from ${stn.name}. Returning to station = same as outbound.`:'';
  // base itself is 0
  driveTimes[stn.name+' (station)']=0; dtMeta[stn.name+' (station)']='confirmed';
  const hospById={}; LOC.hospitals.forEach(h=>hospById[h.id]=h);
  for(const dt of LOC.driveTimes){
    if(dt.from!==homeStationId) continue;
    const h=hospById[dt.to]; if(!h) continue;
    driveTimes[h.name]=dt.minutes;
    dtMeta[h.name]=dt.source==='confirmed'?'confirmed':'estimate';
  }
  // always offer an "Other" fallback
  if(!('Other / custom' in driveTimes)){ driveTimes['Other / custom']=20; dtMeta['Other / custom']='estimate'; }
}

/* ---- persist home station + user-confirmed overrides (in-memory + a tiny URL-free store) ---- */
// NOTE: artifacts can't use localStorage; we keep a module variable. On a real deploy this
// would persist. For now the choice lives for the session.
let _home=null, _overrides={};
function saveHome(){ _home=homeStationId; }
function getHome(){ return _home; }

/* ---- patterns ---- */
function renderPatterns(){
  $('patternChips').innerHTML=PATTERNS.map(p=>`<div class="chip" data-p="${p}">${p}</div>`).join('')+`<div class="chip" data-p="custom">custom</div>`;
  $('patternChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    $('patternChips').querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');
    const p=c.dataset.p;if(p!=='custom'){const[s,e]=p.split('-');$('rosterStart').value=s+':00';$('rosterEnd').value=e+':00';}else{$('rosterStart').value='';$('rosterEnd').value='';}
  });
}

/* ---- drive-time table with confirmed/estimate labels and editing ---- */
function renderTT(){
  const rows=Object.keys(driveTimes);
  if(!rows.length){ $('ttBody').innerHTML='<tr><td colspan="3" class="locnote">Pick your station above to see drive-times.</td></tr>'; return; }
  $('ttBody').innerHTML=rows.map(name=>{
    const status=dtMeta[name]||'estimate';
    const total=driveTimes[name]||0;
    const hh=Math.floor(total/60), mm=total%60;
    return `<tr><td>${name}</td>
      <td><span class="hm"><input type="number" min="0" max="23" value="${hh}" data-loc="${name}" data-part="h"><label class="hmlab">h</label><input type="number" min="0" max="59" value="${mm}" data-loc="${name}" data-part="m"><label class="hmlab">m</label></span></td>
      <td><span class="stat ${status}">${status}</span></td></tr>`;
  }).join('');
  $('ttBody').querySelectorAll('input').forEach(i=>i.onchange=()=>{
    const name=i.dataset.loc;
    const row=i.closest('tr');
    const h=Number(row.querySelector('[data-part="h"]').value)||0;
    const m=Number(row.querySelector('[data-part="m"]').value)||0;
    driveTimes[name]=h*60+m;
    dtMeta[name]='confirmed';      // a user edit is, by definition, a confirmation
    renderTT(); renderCalls(); renderGaps();
  });
}
$('addLoc').onclick=()=>{const n=$('newLoc').value.trim();if(!n)return;if(!(n in driveTimes)){driveTimes[n]=20;dtMeta[n]='estimate';}$('newLoc').value='';renderTT();renderCalls();};

/* ---- calls ---- */
// Build county-grouped <optgroup> options of ALL hospitals, plus station + Other.
// Drive-time still comes from the station table; a hospital with no set time uses Other-style fallback.
function locationOptions(selected){
  if(!LOC) return `<option>Other / custom</option>`;
  const stn=LOC.stations.find(s=>s.id===homeStationId);
  const stnName=stn?stn.name+' (station)':null;
  // group hospitals by county
  const byCounty={};
  for(const h of LOC.hospitals){
    const c=h.county||'Unknown';
    (byCounty[c]=byCounty[c]||[]).push(h);
  }
  const counties=Object.keys(byCounty).sort((a,b)=> a==='Unknown'?1 : b==='Unknown'?-1 : a.localeCompare(b));
  let html='';
  // station + Other at top for quick access
  html+=`<optgroup label="Quick">`;
  if(stnName) html+=`<option ${selected===stnName?'selected':''}>${stnName}</option>`;
  html+=`<option ${selected==='Other / custom'?'selected':''}>Other / custom</option></optgroup>`;
  for(const c of counties){
    html+=`<optgroup label="${c}">`+byCounty[c]
      .sort((a,b)=>(a.name||'').localeCompare(b.name||''))
      .map(h=>`<option ${selected===h.name?'selected':''}>${h.name}</option>`).join('')+`</optgroup>`;
  }
  return html;
}
function addCall(){calls.push({cad:'',start:'',clear:'',loc:''});renderCalls();}

const COUNTIES=['Carlow','Cavan','Clare','Cork','Donegal','Dublin','Galway','Kerry','Kildare','Kilkenny','Laois','Leitrim','Limerick','Longford','Louth','Mayo','Meath','Monaghan','Offaly','Roscommon','Sligo','Tipperary','Waterford','Westmeath','Wexford','Wicklow','Unknown'];

// Add a user-named location to LOC + driveTimes as a CONFIRMED route from the home station.
// It then appears in the county-grouped dropdown and the drive-time table like any other.
function saveCustomLocation(name, county, minutes){
  name=(name||'').trim(); if(!name) return false;
  county=county||'Unknown';
  // de-dupe by name
  let h=LOC.hospitals.find(x=>x.name.toLowerCase()===name.toLowerCase());
  if(!h){
    h={ id:'hosp_custom_'+name.toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0,20),
        name, eircode:null, lat:null, lng:null, county, county_confidence:'user',
        source:'user', verified:true };
    LOC.hospitals.push(h);
  } else { h.county=county; }
  // confirmed drive-time from current station
  const ex=LOC.driveTimes.find(d=>d.from===homeStationId && d.to===h.id);
  if(ex){ ex.minutes=minutes; ex.source='confirmed'; }
  else LOC.driveTimes.push({ from:homeStationId, to:h.id, minutes, source:'confirmed', by:'user' });
  // reflect into the live driveTimes map used by the engine
  driveTimes[name]=minutes; dtMeta[name]='confirmed';
  return h.name;
}

function renderCalls(){
  if(!calls.length){$('callList').innerHTML='<div class="empty">No calls yet. Add the first call from the MDT.</div>';return;}
  const ready = LOC && homeStationId;
  const locField = ready
    ? (i,c)=>{
        const isOther = c.loc==='Other / custom';
        const custom = isOther ? `
          <div class="custombox" data-ci="${i}">
            <div class="locnote" style="margin-bottom:8px">Name where you cleared, set the drive-time back to base, then save it to reuse next time.</div>
            <label class="fld"><span>Location name</span><input type="text" data-cf="cname" data-i="${i}" value="${c.customName||''}" placeholder="e.g. Navan injury unit"></label>
            <label class="fld"><span>County</span><select data-cf="ccounty" data-i="${i}">${COUNTIES.map(co=>`<option ${ (c.customCounty||'Unknown')===co?'selected':''}>${co}</option>`).join('')}</select></label>
            <label class="fld"><span>Drive-time back to base</span>
              <span class="hm"><input type="number" min="0" max="23" data-cf="ch" data-i="${i}" value="${Math.floor((c.customMin||0)/60)}"><label class="hmlab">h</label><input type="number" min="0" max="59" data-cf="cm" data-i="${i}" value="${(c.customMin||0)%60}"><label class="hmlab">m</label></span>
            </label>
            <button class="act ghost small" data-savecustom="${i}">Save location to my list</button>
          </div>` : '';
        return `<label class="fld"><span>Cleared at</span><select data-f="loc" data-i="${i}">${locationOptions(c.loc)}</select></label>${custom}`;
      }
    : (i,c)=>`<label class="fld"><span>Cleared at</span><div class="locnote">Pick your home station at the top first, then locations appear here.</div></label>`;
  $('callList').innerHTML=calls.map((c,i)=>`<div class="call"><div class="top"><span class="cad">CALL ${i+1}</span><button class="del" data-del="${i}">&times;</button></div>
    <label class="fld"><span>CAD / incident #</span><input type="text" inputmode="numeric" data-f="cad" data-i="${i}" value="${c.cad}" placeholder="5886259"></label>
    <div class="row2"><label class="fld"><span>Start</span><input type="time" data-f="start" data-i="${i}" value="${c.start}"></label>
    <label class="fld"><span>Clear</span><input type="time" data-f="clear" data-i="${i}" value="${c.clear}"></label></div>
    ${locField(i,c)}</div>`).join('');
  $('callList').querySelectorAll('[data-f]').forEach(el=>el.oninput=el.onchange=()=>{
    calls[el.dataset.i][el.dataset.f]=el.value;
    if(el.dataset.f==='loc') renderCalls();  // only re-render to toggle the custom box
    renderGaps();
  });
  // custom-field handlers (store on the call object as we type)
  $('callList').querySelectorAll('[data-cf]').forEach(el=>el.oninput=el.onchange=()=>{
    const i=el.dataset.i, k=el.dataset.cf, c=calls[i];
    if(k==='cname') c.customName=el.value;
    else if(k==='ccounty') c.customCounty=el.value;
    else { const row=el.closest('.custombox'); const h=Number(row.querySelector('[data-cf="ch"]').value)||0; const m=Number(row.querySelector('[data-cf="cm"]').value)||0; c.customMin=h*60+m; }
  });
  $('callList').querySelectorAll('[data-savecustom]').forEach(b=>b.onclick=()=>{
    const i=b.dataset.savecustom, c=calls[i];
    const saved=saveCustomLocation(c.customName, c.customCounty, c.customMin||0);
    if(!saved){ alert('Give the location a name first.'); return; }
    c.loc=saved; delete c.customName; delete c.customCounty; delete c.customMin;
    renderTT(); renderCalls(); renderGaps();
  });
  $('callList').querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{calls.splice(+b.dataset.del,1);gapAnswers={};renderCalls();renderGaps();});
}
$('addCall').onclick=addCall;

function currentInput(){return{rosterStart:$('rosterStart').value,rosterEnd:$('rosterEnd').value,backAtBase:$('backAtBase').value||null,otRoundInc:Number($('otRound').value),driveTimes,calls:calls.filter(c=>c.start&&c.clear),gapAnswers};}
function renderGaps(){
  const inp=currentInput();if(inp.calls.length<2){$('gapQuestions').innerHTML='';return;}
  const flat=[];inp.calls.forEach(c=>{flat.push(ENGINE.parseTime(c.start));flat.push(ENGINE.parseTime(c.clear));});
  const uw=ENGINE.unwrap(flat);const ev=inp.calls.map((c,i)=>({...c,startM:uw[i*2],clearM:uw[i*2+1]}));
  const gaps=ENGINE.analyzeGaps(ev,driveTimes).filter(g=>g.possible);
  if(!gaps.length){$('gapQuestions').innerHTML='';return;}
  $('gapQuestions').innerHTML='<h2 class="sec">Resolve gaps</h2>'+gaps.map(g=>`<div class="gap-q"><div class="qtxt">Between <b>${ENGINE.fmtClock(g.clearAt)}</b> and <b>${ENGINE.fmtClock(g.nextStart)}</b> (${ENGINE.fmtDur(g.gap)} gap) you could have been back at base. Were you there 10+ minutes?</div><div class="opts"><button data-g="${g.index}" data-a="yes" class="${gapAnswers[g.index]==='yes'?'on':''}">Yes, returned</button><button data-g="${g.index}" data-a="no" class="${gapAnswers[g.index]==='no'?'on':''}">No, stayed out</button></div></div>`).join('');
  $('gapQuestions').querySelectorAll('button').forEach(b=>b.onclick=()=>{gapAnswers[b.dataset.g]=b.dataset.a;renderGaps();});
}
function compute(){
  const r=ENGINE.computeShift(currentInput());const out=$('output');
  if(r.error){out.innerHTML=`<div class="card warnline">${r.error}</div>`;return;}
  if(!r.ok){renderGaps();out.innerHTML='<div class="card warnline">Answer the gap question(s) above, then compute again.</div>';return;}
  const ot=r.overtime,sub=r.subsistence;
  out.innerHTML=`<div class="result"><div class="head"><div class="ttl">Computed shift &middot; ${$('shiftDate').value||'no date'}</div></div>
    <div class="metrics"><div class="metric ot"><div class="big">${(ot.roundedMin/60).toFixed(2).replace(/\.00$/,'')}h</div><div class="lbl">Overtime ${Number($('otRound').value)?'(up '+$('otRound').value+'m)':'(exact)'}</div></div>
    <div class="metric sub"><div class="big">${sub.summary}</div><div class="lbl">Subsistence tiers</div></div></div>
    <div class="ledger">${r.awayWindows.map((w,i)=>`<div class="lrow"><span class="t">${ENGINE.fmtClock(w.start)}-${ENGINE.fmtClock(w.end)}</span><span class="d">Away window ${i+1}: ${ENGINE.fmtDur(w.durMin)} ${w.tier===10?'<span class="pill t10">10h tier</span>':w.tier===5?'<span class="pill t5">5h tier</span>':'<span class="pill">under 5h</span>'}</span></div>`).join('')}
    <div class="lrow" style="border-top:1px solid var(--line);margin-top:6px;padding-top:9px"><span class="t">${ENGINE.fmtClock(ot.rosterEndM)}</span><span class="d">Rostered end &middot; back at base ${ENGINE.fmtClock(ot.backM)} &middot; raw ${ENGINE.fmtDur(ot.rawMin)}${Number($('otRound').value)?', up to '+ENGINE.fmtDur(ot.roundedMin):''}</span></div></div>
    <details class="tt" style="padding:10px 14px"><summary>Step trace</summary><div style="margin-top:8px">${r.ledger.map(l=>`<div class="lrow"><span class="t">${ENGINE.fmtClock(l.atMin)}</span><span class="d">${l.text}<span class="pill ${l.kind}">${l.kind}</span></span></div>`).join('')}</div></details>
    <div class="note">App assists, you assert. These figures rest on the locations and gap answers you confirmed, the record you stand behind for the claim.</div></div>`;
  lastComputed = { r, input: currentInput() };
  $('saveShift').style.display = '';
}
$('compute').onclick=compute;

/* ===== SAVE + WEEK HISTORY (Sunday-ending, mirrors the paper paysheet) ===== */
// NOTE: artifacts cannot persist across reloads. This holds shifts for the session.
// The logic is storage-ready: swap `shiftStore` for a real store and history persists.
let lastComputed = null;
let shiftStore = {};   // keyed by date 'YYYY-MM-DD'

function weekEndingSunday(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();                 // 0=Sun..6=Sat
  const add = (7 - day) % 7;              // days to next Sunday (0 if already Sun)
  d.setDate(d.getDate()+add);
  return d.toISOString().slice(0,10);
}
function fmtDate(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString('en-IE',{weekday:'short',day:'numeric',month:'short'});
}

function saveShift(){
  if(!lastComputed) return;
  const date = $('shiftDate').value;
  if(!date){ alert('Set the shift date first.'); return; }
  const { r, input } = lastComputed;
  const stn = LOC && homeStationId ? (LOC.stations.find(s=>s.id===homeStationId)||{}).name : '';
  // capture exactly what the paysheet row needs
  shiftStore[date] = {
    date,
    station: stn || '',
    rosterStart: input.rosterStart, rosterEnd: input.rosterEnd,
    actualStart: r.events[0] ? ENGINE.fmtClock(r.events[0].startM) : input.rosterStart,
    actualEnd: ENGINE.fmtClock(r.overtime.backM),
    otFrom: ENGINE.fmtClock(r.overtime.rosterEndM),
    otTo: ENGINE.fmtClock(r.overtime.backM),
    otHours: +(r.overtime.roundedMin/60).toFixed(2),
    subsistence: r.awayWindows.filter(w=>w.tier>0).map(w=>({from:ENGINE.fmtClock(w.start),to:ENGINE.fmtClock(w.end),tier:w.tier})),
    cads: input.calls.map(c=>c.cad).filter(Boolean),
    cadsCleared: false
  };
  $('saveShift').style.display='none';
  renderHistory();
  // jump to history
  $('history').scrollIntoView({behavior:'smooth',block:'start'});
}
$('saveShift').onclick=saveShift;

function clearWeekCads(weekEnd){
  for(const date in shiftStore){
    if(weekEndingSunday(date)===weekEnd){ shiftStore[date].cads=[]; shiftStore[date].cadsCleared=true; }
  }
  renderHistory();
}
function deleteShift(date){
  if(confirm('Delete '+fmtDate(date)+' from your record?')){ delete shiftStore[date]; renderHistory(); }
}

function renderHistory(){
  const dates = Object.keys(shiftStore).sort().reverse();
  if(!dates.length){ $('history').innerHTML='<div class="empty">No saved shifts yet. Compute a shift, then save it to your week.</div>'; return; }
  // group by week-ending Sunday
  const weeks = {};
  for(const date of dates){ const w=weekEndingSunday(date); (weeks[w]=weeks[w]||[]).push(date); }
  const weekKeys = Object.keys(weeks).sort().reverse();
  $('history').innerHTML = weekKeys.map(wk=>{
    const days = weeks[wk].sort(); // Mon..Sun within the week
    const totOT = days.reduce((s,d)=>s+shiftStore[d].otHours,0);
    const tot5 = days.reduce((s,d)=>s+shiftStore[d].subsistence.filter(x=>x.tier===5).length,0);
    const tot10 = days.reduce((s,d)=>s+shiftStore[d].subsistence.filter(x=>x.tier===10).length,0);
    const anyCads = days.some(d=>shiftStore[d].cads.length);
    const subSum = [tot10?tot10+'x10h':'',tot5?tot5+'x5h':''].filter(Boolean).join(' + ')||'none';
    return `<div class="week">
      <div class="weekhead">
        <div><b>Week ending Sun ${fmtDate(wk)}</b></div>
        <div class="weektot">${totOT}h OT &middot; ${subSum}</div>
      </div>
      ${days.map(d=>renderDayRow(shiftStore[d])).join('')}
      ${anyCads?`<button class="act ghost small clearcads" data-wk="${wk}">Clear this week's incident numbers (after you've copied them to paper)</button>`:'<div class="locnote" style="padding:8px 2px">Incident numbers cleared for this week.</div>'}
    </div>`;
  }).join('');
  $('history').querySelectorAll('.clearcads').forEach(b=>b.onclick=()=>{
    if(confirm("Clear incident numbers for the week ending "+fmtDate(b.dataset.wk)+"? Keep the overtime and subsistence totals; only the CAD numbers are removed. Do this once they're on your paper sheet.")) clearWeekCads(b.dataset.wk);
  });
  $('history').querySelectorAll('.delday').forEach(b=>b.onclick=()=>deleteShift(b.dataset.date));
}

function renderDayRow(s){
  const sub = s.subsistence.length
    ? s.subsistence.map(x=>`${x.from}-${x.to} <span class="pill ${x.tier===10?'t10':'t5'}">${x.tier}h</span>`).join(' ')
    : '<span class="locnote">none</span>';
  const cads = s.cads.length ? s.cads.join(', ') : (s.cadsCleared?'<span class="locnote">cleared</span>':'<span class="locnote">none</span>');
  return `<div class="dayrow">
    <div class="dayhead"><b>${fmtDate(s.date)}</b><button class="del delday" data-date="${s.date}" title="delete">&times;</button></div>
    <div class="daygrid">
      <div><span class="dl">Actual</span>${s.actualStart}-${s.actualEnd}</div>
      <div><span class="dl">Station</span>${s.station||'-'}</div>
      <div><span class="dl">Overtime</span>${s.otHours}h (${s.otFrom}-${s.otTo})</div>
      <div><span class="dl">Subsistence</span>${sub}</div>
      <div class="cadcell"><span class="dl">Incident no.</span>${cads}</div>
    </div>
  </div>`;
}

renderPatterns();$('shiftDate').valueAsDate=new Date();
loadLocations();
renderHistory();
</script>
